limit_req_zone $binary_remote_addr zone=mylimit:10m rate=100r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dndcampaign.myddns.me;

    # Permanent redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS Server Block (SSL Termination and Reverse Proxy)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dndcampaign.myddns.me;

    # SSL Certificates
    ssl_certificate /etc/nginx/ssl/dndcampaign_myddns_me.pem;
    ssl_certificate_key /etc/nginx/ssl/dndcampaign.myddns.me.key;

    # Recommended SSL settings for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
sudo 
    }
}

