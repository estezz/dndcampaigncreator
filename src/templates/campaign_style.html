<style>
    :root {
        --bg-parchment: #fdf6e3;
        --bg-dark: #1a1a1a;
        --text-main: #333;
        --header-red: #8b0000;
        --accent-gold: #c5a059;
        --stat-block-bg: #f2eecb;
    }

    body {
        font-family: 'Book Antiqua', 'Palatino Linotype', serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
    }

    .container {
        background-color: var(--bg-parchment);
        max-width: 1000px;
        margin: 0 auto;
        padding: 50px;
        box-shadow: 0 0 15px rgba(0,0,0,0.7);
        border: 1px solid #d4c4a0;
    }

    /* Navigation / TOC */
    .toc {
        background: rgba(0,0,0,0.05);
        padding: 20px;
        border: 1px solid var(--accent-gold);
        margin-bottom: 40px;
    }
    .toc h3 { margin-top: 0; border: none; }
    .toc ul { column-count: 2; }
    .toc a { text-decoration: none; color: var(--header-red); font-weight: bold; }
    .toc a:hover { text-decoration: underline; }

    /* Typography */
    .title {
        color: var(--header-red);
        border-bottom: 2px solid var(--accent-gold);
        padding-bottom: 5px;
        text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 2.5em;
    }

    /* Typography */
    h1, h2, h3 {
        color: var(--header-red);
        border-bottom: 2px solid var(--accent-gold);
        padding-bottom: 5px;
    }
    h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 2.5em; }
    
    /* Layout Utilities */
    .section { margin-bottom: 50px; scroll-margin-top: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    
    /* Plot Twist Box */
    .twist-box {
        border: 2px dashed var(--header-red);
        background-color: #fff0f0;
        padding: 15px;
        margin: 10px 0;
    }
    .twist-box strong { color: var(--header-red); text-transform: uppercase; }

    /* Map Section */
    .map-container {
        width: 100%;
        height: 400px;
        background-color: #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 5px double var(--accent-gold);
        margin: 20px 0;
        color: #555;
        font-style: italic;
    }
    .map-container img {
        max-width: 100%;
        max-height: 100%;
    }

    /* NPC Cards */
    .npc-card {
        border: 1px solid var(--accent-gold);
        padding: 15px;
        background: white;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    .npc-role { font-size: 0.9em; color: #666; font-style: italic; }

    /* Monster Stat Block */
    .stat-block {
        background-color: var(--stat-block-bg);
        border: 2px solid #c9ad6a;
        padding: 15px;
        font-family: sans-serif;
        margin-bottom: 20px;
        box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
    }
    .stat-block h3 { border: none; margin: 0; font-family: serif; font-variant: small-caps; font-size: 1.5em; color: var(--header-red); }
    .stat-block hr { border: 0; height: 2px; background: var(--header-red); margin: 10px 0; }
    .stat-line { margin: 5px 0; }
    
    /* Loot Table */
    table.loot-table {
        width: 100%;
        border-collapse: collapse;
    }
    table.loot-table th, table.loot-table td {
        border: 1px solid var(--accent-gold);
        padding: 8px;
        text-align: left;
    }
    table.loot-table th { background: rgba(197, 160, 89, 0.2); }
    /* --- Main Container --- */
    .stat-block {
        background: var(--bg-color);
        width: 400px;
        padding: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        border: 1px solid #d4c4a9;
        box-sizing: border-box;
    }

    /* --- Typography --- */
    .stat-block h1 {
        font-family: var(--font-header);
        color: var(--header-color);
        font-size: 24px;
        margin: 5px 0 0 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .stat-block h2 {
        font-style: italic;
        font-size: 12px;
        margin: 0 0 10px 0;
        color: #333;
    }

    .stat-block h4 {
        display: inline;
        font-weight: bold;
        color: var(--header-color);
        margin: 0;
    }

    .stat-block p {
        margin: 2px 0;
        font-size: 14px;
        line-height: 1.4em;
        color: var(--header-color);
    }

    .property-line p {
        display: inline;
        color: #000;
    }

    /* --- Separators (The Tapered Line) --- */
    .tapered-rule {
        display: block;
        height: 2px;
        border: none;
        margin: 10px 0;
        background: linear-gradient(90deg, transparent 0%, var(--separator-color) 50%, transparent 100%);
    }

    /* --- Ability Score Grid --- */
    .abilities {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        text-align: center;
        color: var(--header-color);
        margin: 10px 0;
    }

    .abilities div h4 {
        display: block;
        margin-bottom: 2px;
        font-size: 12px;
    }

    .abilities div p {
        margin: 0;
        font-size: 14px;
    }

</style>
