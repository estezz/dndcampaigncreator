
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Campaign Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .spinner-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        .d20-spinner {
            width: 150px;
            height: 150px;
            animation: roll 1.5s linear infinite;
        }

        @keyframes roll {
            0% {
                transform: rotate(0deg) translateX(0);
            }
            25% {
                transform: rotate(90deg) translateX(20px);
            }
            50% {
                transform: rotate(180deg) translateX(0);
            }
            75% {
                transform: rotate(270deg) translateX(-20px);
            }
            100% {
                transform: rotate(360deg) translateX(0);
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>D&D Campaign Details</h1>
        <form id="adventure-form">
            <div class="full-width">
                <label for="campaignSetting">Campaign Setting:</label>
                <textarea id="campaignSetting" name="campaignSetting" rows="4" required>
                    Rising from the sea like a rotting tooth, the island is a choked tangle of ancient mangroves and cypress trees. The air hangs heavy with the stench of guano and stagnant water. It is a place of deafening vertical warfare: the high canopy belongs to aggressive, screeching primate colonies, while the darkened skies are ruled by massive clouds of bats. Below lies a treacherous, waist-deep swamp teeming with unseen aquatic predators, ensuring that the only safety is found in the precarious, moss-slicked branches above.
                </textarea>
            </div>
            <div class="horizontal-group full-width">
                <div>
                    <label for="partySize">Party Size:</label>
                    <input type="number" id="partySize" name="partySize" min="1" max="10" value="4" required>
                </div>
                <div>
                    <label for="characterLevel">Character Level:</label>
                    <input type="number" id="characterLevel" name="characterLevel" min="1" max="20" value="2" required>
                </div>
                <div>
                    <label for="numberOfSessions">Number of Sessions:</label>
                    <input type="number" id="numberOfSessions" name="numberOfSessions" min="1" value="4" required>
                </div>
                <div>
                    <label for="numberOfHoursPerSession">Hours Per Session:</label>
                    <input type="number" id="numberOfHoursPerSession" name="numberOfHoursPerSession" min="1" value="3" required>
                </div>
            </div>
            <div class="full-width">
                <label for="storyLine">Story Line:</label>
                <textarea id="storyLine" name="storyLine" rows="6" required>
                    "The Silence of the Swamp" is an adventure where heroes investigate a maddening plague originating from the Isle of Cacophony. Upon arrival, they discover an escalating war between the Simian Dynasty and the Velveteen Wing, whose deafening battle for dominance threatens to wake the island itself—actually a slumbering Dragon Turtle. The party must navigate the treacherous vertical terrain, choosing to ally with a faction or force a neutral truce via an ancient artifact, all while racing against the clock to silence the noise before the leviathan wakes and drowns the entire island.
                </textarea>
            </div>
            <div class="full-width">
                <button type="submit">Submit</button>
            </div>
        </form>
        <div class="spinner-container" id="spinner">
            <svg class="d20-spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <polygon points="50,1 85,25 85,75 50,99 15,75 15,25" fill="#f0f0f0" stroke="#000" stroke-width="2"/>
                <polygon points="50,1 85,25 50,45" fill="#dcdcdc"/>
                <polygon points="85,25 85,75 50,45" fill="#c0c0c0"/>
                <polygon points="85,75 50,99 50,45" fill="#a9a9a9"/>
                <polygon points="50,99 15,75 50,45" fill="#808080"/>
                <polygon points="15,75 15,25 50,45" fill="#696969"/>
                <polygon points="15,25 50,1 50,45" fill="#585858"/>
                <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" dy=".3em">20</text>
            </svg>
        </div>
        <p class="output">(Results will appear here)</p>
    </main>
    <script src="https://unpkg.com/markdown-it@8.4.2/dist/markdown-it.min.js"></script>
    <script src="https://unpkg.com/base64-js@1.3.0/base64js.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script>
        const form = document.getElementById('adventure-form');
        const spinner = document.getElementById('spinner');
        const output = document.querySelector('.output');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            spinner.style.display = 'block';
            output.innerHTML = '';
        });
    </script>
</body>
</html>
