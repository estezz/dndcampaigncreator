
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Campaign Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .spinner-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }
        .spinner {
            border: 16px solid #f3f3f3;
            border-top: 16px solid #3498db;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <main>
        <h1>D&D Campaign Details</h1>
        <form id="adventure-form">
            <div>
                <label for="campaignSetting">Campaign Setting:</label><br>
                <textarea id="campaignSetting" name="campaignSetting" rows="4" cols="50" required>
                    Middle Earth
                </textarea>
            </div>
            <div>
                <label for="partySize">Party Size:</label><br>
                <input type="number" id="partySize" name="partySize" min="1" max="10" value="4" required>
            </div>
            <div>
                <label for="characterLevel">Character Level:</label><br>
                <input type="number" id="characterLevel" name="characterLevel" min="1" max="20" value="2" required>
            </div>
            <div>
                <label for="numberOfSessions">Number of Sessions:</label><br>
                <input type="number" id="numberOfSessions" name="numberOfSessions" min="1" value="4" required>
            </div>
            <div>
                <label for="numberOfHoursPerSession">Hours Per Session:</label><br>
                <input type="number" id="numberOfHoursPerSession" name="numberOfHoursPerSession" min="1" value="3" required>
            </div>
            <div>
                <label for="storyLine">Story Line:</label><br>
                <textarea id="storyLine" name="storyLine" rows="6" cols="50" required>
                    There is a dragon loose on the town.
                </textarea>
            </div>
            <br>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
        <div class="spinner-container" id="spinner">
            <div class="spinner"></div>
        </div>
        <p class="output">(Results will appear here)</p>
    </main>
    <script src="https://unpkg.com/markdown-it@8.4.2/dist/markdown-it.min.js"></script>
    <script src="https://unpkg.com/base64-js@1.3.0/base64js.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script>
        const form = document.getElementById('adventure-form');
        const spinner = document.getElementById('spinner');
        const output = document.querySelector('.output');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            spinner.style.display = 'block';
            output.innerHTML = ''; // Clear previous results

            // The form submission logic is in main.js
            // The spinner will be hidden in main.js after the results are displayed
        });
    </script>
</body>
</html>
