<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Campaign Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .spinner-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        .d20-spinner {
            width: 150px;
            height: 150px;
            animation: roll 1.5s linear infinite;
        }

        @keyframes roll {
            0% {
                transform: rotate(0deg) translateX(0);
            }

            25% {
                transform: rotate(90deg) translateX(20px);
            }

            50% {
                transform: rotate(180deg) translateX(0);
            }

            75% {
                transform: rotate(270deg) translateX(-20px);
            }

            100% {
                transform: rotate(360deg) translateX(0);
            }
        }

        /* --- THE DRAGON BUTTON CONTAINER --- */
        .dragon-btn {
            position: relative;
            padding: 20px 50px;
            background: #3d0505;
            /* Deep, dark red base */
            border: none;
            cursor: pointer;
            outline: none;
            border-radius: 5px;
            /* Initial deep shadow */
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 1),
                inset 0 -4px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease-in-out;
            overflow: hidden;
            /* Ensures pseudo-elements stay inside */
        }

        /* --- THE TEXT --- */
        .btn-text {
            position: relative;
            z-index: 10;
            /* Keeps text on top */
            color: #d4af37;
            /* Dull Gold */
            font-family: 'Cinzel', serif;
            /* A nice fantasy font if available, otherwise serif */
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        /* --- THE SCALES (BACKGROUND TEXTURE) --- */
        /* We use a repeating gradient to simulate overlapping scales */
        .dragon-scales {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            opacity: 0.4;
            background-image:
                linear-gradient(30deg, #5e0a0a 12%, transparent 12.5%, transparent 87%, #5e0a0a 87.5%, #5e0a0a),
                linear-gradient(150deg, #5e0a0a 12%, transparent 12.5%, transparent 87%, #5e0a0a 87.5%, #5e0a0a),
                linear-gradient(30deg, #5e0a0a 12%, transparent 12.5%, transparent 87%, #5e0a0a 87.5%, #5e0a0a),
                linear-gradient(150deg, #5e0a0a 12%, transparent 12.5%, transparent 87%, #5e0a0a 87.5%, #5e0a0a),
                radial-gradient(circle at 50% 50%, #2b0000 20%, transparent 60%);
            background-size: 20px 35px;
            background-position: 0 0, 0 0, 10px 18px, 10px 18px, 0 0;
            transition: 0.5s;
        }


        /* --- THE EYES (HIDDEN UNTIL HOVER) --- */
        /* Using ::before and ::after to create two glowing slits */
        .dragon-btn::before,
        .dragon-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 12px;
            height: 3px;
            /* Slit shape */
            background: #fff6a9;
            /* Bright yellow-white center core */
            /* Intense orange/red glow around the eyes */
            box-shadow: 0 0 10px 3px #ff4500, 0 0 20px 5px #ff0000;
            border-radius: 50%;
            /* Initially hidden by scaling them to 0 height */
            transform: translateY(-50%) scaleY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Nice snappy opening */
            z-index: 5;
        }

        /* Positioning the eyes on the left and right */
        .dragon-btn::before {
            left: 15px;
        }

        .dragon-btn::after {
            right: 15px;
        }


        /* --- HOVER STATE: AWAKEN THE DRAGON --- */
        .dragon-btn:hover {
            /* Button gets brighter and glows externally */
            background: #5e0a0a;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.6),
                inset 0 -2px 0 rgba(0, 0, 0, 0.5);
            padding: 20px 60px;
            /* Widen slightly to make room for eyes */
        }

        /* Make the text glow white-hot */
        .dragon-btn:hover .btn-text {
            color: #fff6a9;
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff4500;
        }

        /* Shift the scales so they look like they are moving */
        .dragon-btn:hover .dragon-scales {
            opacity: 0.7;
            background-position: 5px 5px, 5px 5px, 15px 23px, 15px 23px, 0 0;
        }

        /* Open the eyes */
        .dragon-btn:hover::before,
        .dragon-btn:hover::after {
            transform: translateY(-50%) scaleY(1);
        }


        /* --- ACTIVE STATE: CLICKING --- */
        .dragon-btn:active {
            transform: translateY(3px);
            /* Push down effect */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5),
                inset 0 2px 5px rgba(0, 0, 0, 0.5);
            /* Inner shadow looks like indentation */
        }
    </style>
    /* Import a fantasy font from Google Fonts */
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">
    </style>
</head>

<body>
    <main>
        <h1>D&D Campaign Details</h1>
        <form id="adventure-form">
            <div class="full-width">
                <label for="campaignSetting">Campaign Setting:</label>
                <textarea id="campaignSetting" name="campaignSetting" rows="4" required>
                    Forgotten Realms 
                </textarea>
            </div>
            <div class="horizontal-group full-width">
                <div>
                    <label for="partySize">Party Size:</label>
                    <input type="number" id="partySize" name="partySize" min="1" max="10" value="4" required>
                </div>
                <div>
                    <label for="characterLevel">Character Level:</label>
                    <input type="number" id="characterLevel" name="characterLevel" min="1" max="20" value="2" required>
                </div>
                <div>
                    <label for="numberOfSessions">Number of Sessions:</label>
                    <input type="number" id="numberOfSessions" name="numberOfSessions" min="1" value="4" required>
                </div>
                <div>
                    <label for="numberOfHoursPerSession">Hours Per Session:</label>
                    <input type="number" id="numberOfHoursPerSession" name="numberOfHoursPerSession" min="1" value="3"
                        required>
                </div>
            </div>
            <div class="full-width">
                <label for="storyLine">Story Line:</label>
                <textarea id="storyLine" name="storyLine" rows="6" required>
                    Centuries ago, a Netherese Archwizard named Karsus attempted to steal the power of a god. While his main attempt failed (catastrophically), he left behind experimental "anchors"—artifacts designed to stabilize the Weave around him.
One of these anchors, the Iron Crown, has resurfaced in the desolate mood-lands of The Thar. The Zhentarim (The Black Network) want it to enslave a dragon. The Cult of the Dragon wants it to raise a Dracolich. The players just want to survive the crossfire.
                </textarea>
            </div>
            <div class="full-width">
                <button class="dragon-btn" id="generate-button">
                    <span class="dragon-scales"></span>
                    <span class="btn-text">Awaken Dragon</span>
                </button>
            </div>
        </form>
        <div class="spinner-container" id="spinner">
            <svg class="d20-spinner" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <polygon points="50,1 85,25 85,75 50,99 15,75 15,25" fill="#f0f0f0" stroke="#000" stroke-width="2" />
                <polygon points="50,1 85,25 50,45" fill="#dcdcdc" />
                <polygon points="85,25 85,75 50,45" fill="#c0c0c0" />
                <polygon points="85,75 50,99 50,45" fill="#a9a9a9" />
                <polygon points="50,99 15,75 50,45" fill="#808080" />
                <polygon points="15,75 15,25 50,45" fill="#696969" />
                <polygon points="15,25 50,1 50,45" fill="#585858" />
                <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="middle"
                    dy=".3em">20</text>
            </svg>
        </div>
        <p class="output">(Results will appear here)</p>
    </main>
    <script src="https://unpkg.com/markdown-it@8.4.2/dist/markdown-it.min.js"></script>
    <script src="https://unpkg.com/base64-js@1.3.0/base64js.min.js"></script>
    <script type="module" src="/main.js"></script>
    <script>
        const form = document.getElementById('adventure-form');
        const spinner = document.getElementById('spinner');
        const output = document.querySelector('.output');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            spinner.style.display = 'block';
            output.innerHTML = '';
        });
    </script>
</body>

</html>
